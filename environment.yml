# ---------------------------------------------------------------------------
# §A. PyTorch (CUDA wheel) 별도 설치 — env 생성 후 1줄
# ---------------------------------------------------------------------------
#   conda activate AI-Bio-T-Cell
#   pip install --index-url https://download.pytorch.org/whl/cu124 \
#               'torch>=2.4,<2.6' 'torchvision>=0.19' 'torchaudio>=2.4'
#   pip install 'lightning>=2.4'    # PyPI에서
#
# (`scripts/setup_miniforge.sh`가 자동으로 위를 호출한다.)
#
# 드라이버가 12.1이면 cu124 → cu121, 12.6+이면 cu126 (또는 cu128).
# ---------------------------------------------------------------------------
# 알려진 이슈 / 트러블슈팅
# ---------------------------------------------------------------------------
# 1. R/Python 충돌: conda 안의 r-base를 쓸 때 reticulate가 시스템 R을 잡는 경우가 있다.
#    .Renviron 또는 .Rprofile에 다음을 추가:
#       RETICULATE_PYTHON=/path/to/miniforge3/envs/AI-Bio-T-Cell/bin/python
#
# 2. CUDA 버전 변경: pip:의 --extra-index-url을 교체.
#       https://download.pytorch.org/whl/cu121   (드라이버 12.1)
#       https://download.pytorch.org/whl/cu124   (드라이버 12.4, 현 서버)
#       https://download.pytorch.org/whl/cu126   (드라이버 12.6+)
#    드라이버가 12.x이면 그 이하 wheel은 모두 호환된다 (nvidia-smi의 "CUDA Version"이 상한).
#
# 3. sceasy / SeuratDisk는 conda-forge에 없음 -> R 안에서:
#       remotes::install_github(c('cellgeni/sceasy','mojaveazure/seurat-disk'))
#    스크립트: datasets/01_reaptec_atlas/scripts/install_r_bridge.R
#
# 4. solve 시간이 너무 길면:  CONDA_SOLVER=libmamba mamba env create -f environment.yml
#
# 5. 공용 서버에서 디스크 절약: ~/miniforge3/pkgs 캐시 정기 청소
#       mamba clean -a -y
