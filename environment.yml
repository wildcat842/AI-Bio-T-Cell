name: aibio
channels:
  - conda-forge
  - bioconda
  - pytorch
  - nvidia
dependencies:
  - python=3.11
  - pip
  - numpy>=1.26
  - pandas>=2.1
  - scipy>=1.11
  - scikit-learn>=1.4
  - pyarrow>=15
  - pyyaml
  - requests
  - tqdm
  - matplotlib
  - seaborn
  - jupyterlab
  - ipykernel
  # single-cell
  - anndata>=0.10
  - scanpy>=1.10
  - mudata
  # bioconda 도구
  - samtools
  - bcftools
  - bedtools
  # 테스트/포맷
  - pytest
  - black
  - ruff
  # ML (CPU 기본, GPU는 별도 설치)
  - pytorch>=2.2
  - pytorch-lightning>=2.2
  - pip:
    - torch-geometric>=2.5
    - transformers>=4.40
    - torchcfm
    - wandb
    - -e .
