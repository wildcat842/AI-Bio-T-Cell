# AI-Bio-T-Cell conda env (Miniforge3 / Mamba)
#
# Provides Python 3.12 + R 4.3 + Bioconductor + GPU PyTorch in a single env,
# so that the R<->Python bridge (sceasy / reticulate / anndata2ri) works without
# having to maintain a separate R installation on the shared server.
#
# Quick start:
#   mamba env create -f environment.yml          # 처음 설치 (15-30분)
#   mamba env update -f environment.yml --prune  # 의존성 변경 시 업데이트
#   conda activate AI-Bio-T-Cell
#   pip install -e ".[dev,ml,bridge,genome]"     # Python 측 editable 설치
#   bash datasets/01_reaptec_atlas/scripts/install_r_bridge.R  # sceasy/SeuratDisk
#
# 빠른 솔버: mamba (Miniforge3 ≥23.10 기본 포함) 또는 micromamba
name: AI-Bio-T-Cell
channels:
  - conda-forge
  - bioconda
