name: R CI

on:
  push:
    branches: [main]
    paths:
      - "src/R/**"
      - "tests/R/**"
      - "DESCRIPTION"
      - "renv.lock"
      - ".github/workflows/R-ci.yml"
  pull_request:
    paths:
      - "src/R/**"
      - "tests/R/**"
      - "DESCRIPTION"

jobs:
  rcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::testthat
            any::here
            bioc::GenomicRanges
            bioc::IRanges
            bioc::S4Vectors
      - name: Run tests
        run: Rscript -e 'testthat::test_dir("tests/R", reporter="progress", stop_on_failure=TRUE)'
