name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "src/python/**"
      - "tests/python/**"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "src/python/**"
      - "tests/python/**"
      - "pyproject.toml"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/python tests/python
      - name: Test
        run: pytest tests/python -q
